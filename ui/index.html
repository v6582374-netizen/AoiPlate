<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src data:; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'none'; object-src 'none'; base-uri 'none'; frame-ancestors 'none'"
    />
    <title>AoiPlate Stage</title>
    <style>
{{INLINE_STYLES}}
    </style>
  </head>
  <body>
    <div id="stage" class="stage" role="dialog" aria-label="AoiPlate Explosion Stage">
      <main id="plateLayer" class="plate-layer" aria-live="polite"></main>

      <section id="listModePanel" class="list-mode-panel hidden" aria-label="List Mode">
        <div class="list-head">
          <h2>全部未完成任务</h2>
          <input id="listSearch" type="text" placeholder="搜索未完成任务" />
        </div>
        <ul id="listModeList" class="list-mode-list"></ul>
      </section>

      <div id="permissionBanner" class="permission-banner hidden">
        <button
          id="permissionCloseButton"
          class="permission-close"
          type="button"
          aria-label="关闭权限提示"
        >
          ×
        </button>
        <span>需要开启“输入监听”和“辅助功能”以支持全局触发。</span>
        <button id="openPermissionButton" type="button">打开权限设置</button>
      </div>

      <div id="overflowEditor" class="overflow-editor hidden" aria-hidden="true">
        <div class="overflow-editor-head">
          <strong>完整编辑</strong>
          <span>Enter 保存 · Shift+Enter 换行</span>
        </div>
        <textarea
          id="overflowEditorInput"
          maxlength="240"
          placeholder="编辑完整任务文本"
        ></textarea>
        <div class="overflow-editor-actions">
          <button id="overflowEditorCancel" type="button">取消</button>
          <button id="overflowEditorSave" type="button">保存</button>
        </div>
      </div>

      <div id="contextMenu" class="context-menu hidden">
        <button id="contextDeleteButton" type="button">删除此任务</button>
      </div>

      <div id="inputDock" class="input-dock hidden" aria-hidden="true">
        <div class="input-dock-inner">
          <div class="input-dock-head">
            <strong>新增代办</strong>
            <span>N 快速唤起 · Enter 保存</span>
          </div>
          <input id="modalInput" type="text" maxlength="120" placeholder="把此刻想到的事写下来" />
          <div class="input-actions">
            <button id="modalCancelButton" type="button">取消</button>
            <button id="modalSubmitButton" type="button">保存</button>
          </div>
        </div>
      </div>

      <div id="errorToast" class="error-toast" role="status" aria-live="polite"></div>
    </div>

    <script>
{{INLINE_SCRIPT}}
    </script>
  </body>
</html>
